<!DOCTYPE html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME ROYALE | Battle with 100+ Characters</title>
    <meta name="description" content="A premium anime card battle game. Collect cards, build decks, and battle AI opponents.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <!-- Core Styles -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Main App Container -->
    <div id="app">

        <div id="screen-container"></div>
        
        <!-- Global UI Overlays (Toasts, Modals) -->
        <div id="modal-container" class="hidden"></div>
        <div id="toast-container"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>

</html>
